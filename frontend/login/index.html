<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghana Prisons · Staff login</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Additional styles for login messages */
    .login-message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      font-size: 14px;
    }
    .login-message.info {
      background-color: #e3f2fd;
      color: #1976d2;
      border: 1px solid #90caf9;
    }
    .login-message.success {
      background-color: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #81c784;
    }
    .login-message.error {
      background-color: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- LEFT SIDE: Ghana Prisons branding -->
    <div class="left-panel">
      <div class="brand-row">
        <div class="logo-frame" id="logoFrame">
          <img id="logoImg" class="logo-img" src="assets/images/Ghana_Prisons_Service_GPS_logo-185x300.png" alt="GPS" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="logo-fallback" style="display: none; width:100%; height:100%; align-items:center; justify-content:center;">
            <i class="fas fa-shield-halved"></i>
          </div>
        </div>
        <div class="brand-text">
          <h1>GHANA PRISONS</h1>
          <div class="sut1">SECURED MANAGEMENT SYSTEM</div>
          <div class="sub">reformation · security · service</div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE: login form -->
    <div class="right-panel">
      <div class="form-card">
        <h2>Log in</h2>
        <div class="connect">to continue to staff portal</div>

        <form id="loginForm">
          <!-- username field -->
          <div class="input-group">
            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" id="username" name="username" placeholder="Username or staff ID" required autocomplete="username">
            </div>
          </div>
          <!-- password field -->
          <div class="input-group">
            <div class="input-field">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
          </div>

          <!-- login button -->
          <button type="submit" class="login-btn" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Log in
          </button>

          <div id="loginMessage" class="login-message"></div>

          <!-- links: remember + forgot -->
          <div class="links-row">
            <label class="remember">
              <input type="checkbox" id="remember" name="remember" checked> Keep me logged in
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <!-- divider + create new account -->
          <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or</span>
            <div class="divider-line"></div>
          </div>

          <button type="button" class="create-btn" onclick="window.location.href='#';">
            <i class="fas fa-user-plus"></i> Contact Administrator
          </button>

          <div class="footer-meta">
            <i class="far fa-id-card"></i> Official GPS System · Need help? Ask your administrator
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal for clickable logo -->
  <div id="logoModal" class="modal" aria-hidden="true">
    <div id="modalBackdrop" class="modal-backdrop"></div>
    <div class="modal-content" role="dialog" aria-modal="true">
      <button id="modalClose" class="modal-close" aria-label="Close">&times;</button>
      <img id="modalImg" alt="GPS crest">
    </div>
  </div>

  <!-- Login JavaScript -->

  <script src="script.js"></script>
</body>
</html>
